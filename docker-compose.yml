services:
  redis:
    image: redis:7-alpine
    networks:
      - ocr-net
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  web:
    build:
      context: ./web
    ports:
      - "0.0.0.0:${APP_PORT:-8500}:8000"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - shared-data:/data
    environment:
      - REDIS_URL=redis://redis:6379/0
      - OCR_MODELS=${OCR_MODELS}
    networks:
      - ocr-net
    restart: unless-stopped

  worker:
    build:
      context: ./worker
    command: >
      celery -A app.celery_app worker --beat
      --loglevel=info --concurrency=2 -Q ocr_queue
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - shared-data:/data
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DOCLING_VLM_URL=${DOCLING_VLM_URL:-}
      - DOCLING_VLM_MODEL=${DOCLING_VLM_MODEL:-cyankiwi/Qwen3.5-35B-A3B-AWQ-4bit}
    networks:
      - ocr-net
    restart: unless-stopped

networks:
  ocr-net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.10.2.0/24

volumes:
  redis-data:
  shared-data:
