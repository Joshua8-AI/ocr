services:
  redis:
    image: redis:7-alpine
    networks:
      - ocr-net
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  web:
    build: ./web
    ports:
      - "0.0.0.0:8200:8000"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - shared-data:/data
    environment:
      - REDIS_URL=redis://redis:6379/0
      - OCR_MODELS=${OCR_MODELS:-LightOnOCR-2-1B=http://192.168.30.210:8500/v1}
    networks:
      - ocr-net
    restart: unless-stopped

  worker:
    build: ./worker
    command: >
      uv run celery -A app.celery_app worker --beat
      --loglevel=info --concurrency=2 -Q ocr_queue
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - shared-data:/data
    environment:
      - REDIS_URL=redis://redis:6379/0
    networks:
      - ocr-net
    restart: unless-stopped

networks:
  ocr-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24

volumes:
  redis-data:
  shared-data:
